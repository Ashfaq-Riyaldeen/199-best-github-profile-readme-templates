name: Link Check

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Every template file the index points to must exist, and every
      # relative link inside the repo must resolve.
      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            'README.md' 'CONTRIBUTING.md'
          fail: true

      # External links in the curated docs (index, guides, credits) must
      # be alive. Template files embed thousands of third-party author
      # links that rot outside our control, so they are checked offline
      # above but not fetched here.
      - name: Check curated external links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --timeout 20
            --max-retries 2
            --accept '200..204,206,301..308,403,429'
            --exclude 'img\.shields\.io'
            'README.md' 'CONTRIBUTING.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
