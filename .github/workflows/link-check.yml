name: Link Check

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Validates the curated docs end to end: every template link in the
      # index must resolve to a real file in the repo, and every external
      # link in README/CONTRIBUTING must be alive. Template files embed
      # thousands of third-party author links that rot outside our
      # control, so they are deliberately not fetched.
      - name: Check index and curated links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --timeout 20
            --max-retries 2
            --accept '200..204,206,301..308,403,429'
            --exclude 'img\.shields\.io'
            --exclude 'github\.com/Ashfaq-Riyaldeen/199-best-github-profile-readme-templates'
            'README.md' 'CONTRIBUTING.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
